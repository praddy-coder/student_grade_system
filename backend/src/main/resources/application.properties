spring.application.name=Smart Grade System

# ===== Active Profile =====
# Remove or comment out 'supabase' profile if you want to use the local/custom DB credentials below
spring.profiles.active=supabase

# ===== Custom Database Configuration =====
# To use your own database, comment out `spring.profiles.active=supabase` above and uncomment these lines:
# spring.datasource.url=jdbc:postgresql://localhost:5432/smartgrade_db
# spring.datasource.username=YOUR_CUSTOM_USERNAME
# spring.datasource.password=YOUR_CUSTOM_PASSWORD
# spring.datasource.driver-class-name=org.postgresql.Driver


# ===== Server =====
server.port=8081

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
jwt.secret=SmartGradeSystemSuperSecretKeyThatIsLongEnoughForHS512Algorithm2024!@#$%
jwt.expiration=86400000

# ===== CORS =====
cors.allowed-origins=http://localhost:5173
